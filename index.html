<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Business Notebook</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:20px;
}

input{
  width:85%;
  padding:10px;
  margin:6px;
  border-radius:8px;
  border:none;
}

button{
  padding:10px 15px;
  margin:5px;
  background:#22c55e;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

.card{
  background:#1e293b;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
}

a{ color:#38bdf8; }
</style>

</head>

<body>

<h2>📒 Business Notebook</h2>

<p>Language / ভাষা</p>
<select id="lang" onchange="changeLang()">
  <option value="en">English</option>
  <option value="bn">বাংলা</option>
</select>

<div class="card">

<h3 id="title">Add Product Entry</h3>

<input id="name" placeholder="Product Name">
<input id="stock" placeholder="Stock / মজুদ">
<input id="sold" placeholder="Sold / বিক্রি">

<button onclick="saveData()">Save</button>

</div>

<div class="card">

<h3 id="historyTitle">📜 History</h3>
<div id="list"></div>

</div>

<div class="card">

<h3>➕ Add Extra Field</h3>
<input id="newField" placeholder="Field name">
<button onclick="addField()">Add Field</button>

<div id="extraFields"></div>

</div>

<div class="card">

<h3>👤 Owner</h3>
<p>Muhammad Umar Arju</p>

<a href="https://www.instagram.com/muhammad_umar_arju?igsh=MTV1ZGwwaDMwNm03Mw%3D%3D&utm_source=qr" target="_blank">
👉 Follow on Instagram
</a>

</div>

<script>

let data = JSON.parse(localStorage.getItem("data") || "[]");
let fields = [];

// save main data
function saveData(){

  let obj = {
    name: document.getElementById("name").value,
    stock: document.getElementById("stock").value,
    sold: document.getElementById("sold").value,
    extra: {}
  };

  fields.forEach(f=>{
    obj.extra[f] = document.getElementById(f).value || "";
  });

  data.push(obj);
  localStorage.setItem("data", JSON.stringify(data));

  showData();
}

// show history
function showData(){
  let html = "";

  data.forEach((d,i)=>{
    html += `
    <div class="card">
      <b>${d.name}</b><br>
      Stock: ${d.stock}<br>
      Sold: ${d.sold}<br>
      `;

    for(let k in d.extra){
      html += `${k}: ${d.extra[k]}<br>`;
    }

    html += "</div>";
  });

  document.getElementById("list").innerHTML = html;
}

// add custom field
function addField(){
  let f = document.getElementById("newField").value;
  if(!f) return;

  fields.push(f);

  let input = document.createElement("input");
  input.placeholder = f;
  input.id = f;

  document.getElementById("extraFields").appendChild(input);
}

// language switch
function changeLang(){
  let lang = document.getElementById("lang").value;

  if(lang=="bn"){
    document.getElementById("title").innerText="পণ্য যোগ করুন";
    document.getElementById("historyTitle").innerText="হিস্টরি";
  }else{
    document.getElementById("title").innerText="Add Product Entry";
    document.getElementById("historyTitle").innerText="History";
  }
}

showData();

</script>

</body>
</html>
