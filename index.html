<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Excel Notebook</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:10px;
}

table{
  width:100%;
  margin-top:20px;
  border-collapse: collapse;
}

th, td{
  border:1px solid #334155;
  padding:8px;
}

input{
  width:100%;
  background:#1e293b;
  color:white;
  border:none;
  padding:5px;
}

button{
  padding:10px 15px;
  margin:5px;
  background:#22c55e;
  border:none;
  color:white;
  border-radius:8px;
}

.card{
  background:#1e293b;
  padding:10px;
  margin-top:10px;
}
a{ color:#38bdf8; }
</style>

</head>

<body>

<h2>📊 Excel Notebook App</h2>

<button onclick="addRow()">➕ Add Row</button>
<button onclick="save()">💾 Save</button>
<button onclick="load()">📂 Load</button>

<table id="table">
  <tr>
    <th>Product</th>
    <th>Stock</th>
    <th>Sold</th>
    <th>Price</th>
  </tr>
</table>

<div class="card">
<h3>👤 Owner</h3>
<p>Muhammad Umar Arju</p>

<a href="https://www.instagram.com/muhammad_umar_arju?igsh=MTV1ZGwwaDMwNm03Mw%3D%3D&utm_source=qr" target="_blank">
👉 Follow on Instagram
</a>
</div>

<script>

function addRow(){
  let table = document.getElementById("table");

  let row = table.insertRow();

  row.innerHTML = `
    <td><input></td>
    <td><input></td>
    <td><input></td>
    <td><input></td>
  `;
}

// save to localStorage
function save(){

  let table = document.getElementById("table");
  let data = [];

  for(let i=1;i<table.rows.length;i++){
    let row = table.rows[i];
    let obj = {
      product: row.cells[0].children[0].value,
      stock: row.cells[1].children[0].value,
      sold: row.cells[2].children[0].value,
      price: row.cells[3].children[0].value
    };
    data.push(obj);
  }

  localStorage.setItem("excelData", JSON.stringify(data));
  alert("Saved!");
}

// load data
function load(){

  let data = JSON.parse(localStorage.getItem("excelData") || "[]");

  let table = document.getElementById("table");

  // clear old rows
  table.innerHTML = `
    <tr>
      <th>Product</th>
      <th>Stock</th>
      <th>Sold</th>
      <th>Price</th>
    </tr>
  `;

  data.forEach(d=>{
    let row = table.insertRow();

    row.innerHTML = `
      <td><input value="${d.product}"></td>
      <td><input value="${d.stock}"></td>
      <td><input value="${d.sold}"></td>
      <td><input value="${d.price}"></td>
    `;
  });
}

load();

</script>

</body>
</html>
