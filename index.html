<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Business Calculator App</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:20px;
}

input, select{
  width:85%;
  padding:10px;
  margin:8px;
  border-radius:8px;
  border:none;
}

button{
  padding:10px 20px;
  background:#22c55e;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

.card{
  background:#1e293b;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
}

a{
  color:#38bdf8;
}
</style>

</head>

<body>

<h2>💰 Business Profit Calculator</h2>

<p>Language / ভাষা</p>
<select id="lang">
  <option value="en">English</option>
  <option value="bn">বাংলা</option>
</select>

<div class="card">

<h3 id="t1">Cost & Profit Calculator</h3>

<input id="cost" placeholder="Total Cost / মোট খরচ">
<input id="sell" placeholder="Selling Price / বিক্রয় মূল্য">
<input id="qty" placeholder="Quantity Sold / কতটা বিক্রি">

<button onclick="calcProfit()">Calculate</button>

<h3 id="result"></h3>

</div>

<div class="card">

<h3 id="t2">Ad Break-even Calculator</h3>

<input id="ad" placeholder="Ad Budget / বিজ্ঞাপন বাজেট">
<input id="profit" placeholder="Profit per product / প্রতি পণ্যে লাভ">

<button onclick="calcAd()">Calculate</button>

<h3 id="adResult"></h3>

</div>

<div class="card">

<h3>📈 AI Suggestion</h3>
<p id="ai">Enter data to get suggestion</p>

</div>

<div class="card">

<h3>👤 App Owner</h3>
<p>Muhammad Umar Arju</p>

<a href="https://www.instagram.com/muhammad_umar_arju?igsh=MTV1ZGwwaDMwNm03Mw%3D%3D&utm_source=qr" target="_blank">
👉 Follow on Instagram
</a>

</div>

<script>

// Language switch
document.getElementById("lang").onchange = function(){
  let lang = this.value;

  if(lang=="bn"){
    document.getElementById("t1").innerText="খরচ ও লাভ হিসাব";
    document.getElementById("t2").innerText="বিজ্ঞাপন ব্রেক-ইভেন হিসাব";
  }else{
    document.getElementById("t1").innerText="Cost & Profit Calculator";
    document.getElementById("t2").innerText="Ad Break-even Calculator";
  }
}

// Profit calculator
function calcProfit(){
  let cost = +document.getElementById("cost").value;
  let sell = +document.getElementById("sell").value;
  let qty = +document.getElementById("qty").value;

  let profit = (sell - cost) * qty;

  document.getElementById("result").innerText =
  "Profit / লাভ: " + profit;

  smartAI(profit);
}

// Ad calculator
function calcAd(){
  let ad = +document.getElementById("ad").value;
  let profit = +document.getElementById("profit").value;

  let need = ad / profit;

  document.getElementById("adResult").innerText =
  "Need Sales / বিক্রি দরকার: " + Math.ceil(need);

  smartAI(need);
}

// Simple AI logic (rule based)
function smartAI(value){

  let msg = "";

  if(value < 0){
    msg = "⚠️ Loss detected! Cost too high or price low.";
  }
  else if(value > 0 && value < 1000){
    msg = "👍 Small profit. Try increasing sales or margin.";
  }
  else{
    msg = "🔥 Good business! Keep scaling.";
  }

  document.getElementById("ai").innerText = msg;
}

</script>

</body>
</html>
