<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Firebase Connected App</title>

  <!-- Firebase CDN -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

</head>
<body style="text-align:center; font-family:Arial;">

<h2>🔥 Firebase Connected</h2>

<input id="data" placeholder="Write something">
<br><br>
<button onclick="saveData()">Save</button>

<h3>📜 Data from Firebase</h3>
<div id="output"></div>

<script>

// 🔥 আপনার Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyADglyLzklZXYwMQYz_FmTkoy8rsRVNHB4",
  authDomain: "my-app-3a8f0.firebaseapp.com",
  projectId: "my-app-3a8f0",
  storageBucket: "my-app-3a8f0.firebasestorage.app",
  messagingSenderId: "135428878429",
  appId: "1:135428878429:web:64c4bf4d6ee8f0243e9db4",
  measurementId: "G-5TGRZGFS1Q"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ✅ Data Save
function saveData(){
  let value = document.getElementById("data").value;

  db.collection("apps").add({
    text: value,
    time: Date.now()
  });

  loadData();
}

// ✅ Data Load
function loadData(){
  db.collection("apps").orderBy("time","desc").get()
  .then(snapshot=>{
    let html="";
    snapshot.forEach(doc=>{
      html += "<p>"+doc.data().text+"</p>";
    });
    document.getElementById("output").innerHTML = html;
  });
}

loadData();

</script>

</body>
</html>
